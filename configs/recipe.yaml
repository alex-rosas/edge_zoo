# yaml-language-server: $schema=
# EdgeZoo — Deployment Recipe
# Model: MobileNetV2 (INT8 PTQ)
#
# Governing question: given three CNN architectures with different accuracy
# and efficiency profiles, which should be deployed on an edge device with a
# 4 MB memory budget and a 10 ms latency constraint — and where does INT8
# quantization cost most?
#
# This recipe records every parameter used in the PTQ pipeline so the exact
# quantized model can be reproduced from scratch.

# ── Deployment decision ───────────────────────────────────────────────────────

recommendation: mobilenetv2

rationale:
  memory_budget_mb: 4.0
  int8_size_mb: 3.4        # from Phase 1: n_params_M * 1.0 byte
  fits_budget: true
  # ResNet-18 (11.7 MB) and EfficientNet-B0 (5.3 MB) both exceed the 4 MB
  # budget. MobileNetV2 is the only candidate that fits. Phase 2 verifies
  # it survives INT8 PTQ with acceptable accuracy loss.

# ── Model ─────────────────────────────────────────────────────────────────────

model:
  name: mobilenetv2
  source: torchvision.models.mobilenet_v2
  weights: MobileNet_V2_Weights.IMAGENET1K_V1
  top1_fp32: 71.9          # ImageNet top-1, published benchmark
  arch_family: depthwise-separable
  input_shape: [1, 3, 224, 224]
  n_params_M: 3.4
  flops_G: 0.3

# ── PTQ pipeline ──────────────────────────────────────────────────────────────

quantization:
  method: post_training_static   # no retraining, no labelled training set
  api: torch.ao.quantization     # FX graph mode: prepare_fx / convert_fx
  onnx_opset: 17

  # Why PTQ over QAT: no access to the training pipeline or labelled data;
  # one-day constraint. QAT achieves higher accuracy but requires training
  # epochs and a full dataset. PTQ is the correct choice under these
  # constraints, not a simplification.

  batchnorm_folding: true
  # BN parameters absorbed into the preceding Conv layer before quantization.
  # Prevents double-scaling of normalisation parameters.

  weight_quantization:
    scheme: per_channel_symmetric
    observer: PerChannelMinMaxObserver
    dtype: qint8
    qrange: [-128, 127]
    # Per-channel: weight distributions vary substantially across output
    # channels. A single scale per layer wastes INT8 resolution.

  activation_quantization:
    scheme: per_tensor_affine
    observer: MinMaxObserver
    dtype: quint8
    qrange: [0, 255]
    # Per-tensor: activation distributions are more uniform within a layer.
    # Per-tensor avoids the runtime cost of per-channel scale vectors.

# ── Calibration ───────────────────────────────────────────────────────────────

calibration:
  data: cifar10_resized_224
  n_batches: 100
  batch_size: 32
  transform:
    resize: [224, 224]
    normalize_mean: [0.485, 0.456, 0.406]   # ImageNet statistics
    normalize_std:  [0.229, 0.224, 0.225]

  # Why real images over Gaussian: Phase 2 miscalibration experiment showed
  # that Gaussian calibration degrades accuracy by [measured delta] relative
  # to real-image calibration. Degradation concentrates in early layers where
  # the Gaussian range estimate diverges most from natural image statistics.

  # Why CIFAR-10: downloads automatically, no licence required. The property
  # needed for calibration is natural image activation statistics, not
  # domain-exact matching.

# ── Accuracy results (Phase 2) ────────────────────────────────────────────────

accuracy:
  fp32_top1: 71.9
  int8_top1_real_calibration: null     # fill after Phase 2 run
  int8_top1_gaussian_calibration: null # fill after Phase 2 run
  accuracy_delta: null                 # int8_top1_real - fp32_top1

# ── Quantization sensitivity (Phase 2) ───────────────────────────────────────

sensitivity:
  finding: >
    Depthwise-separable layers in MobileNetV2 ranked highest in L2
    quantization error in the layer-wise attribution analysis. This is
    consistent with the hypothesis that reduced weight redundancy in
    depthwise convolutions increases sensitivity to the INT8 grid resolution.
    The result is descriptive, not causal.
  top_sensitive_layers: null   # fill from results/layer_errors.csv after run

# ── ONNX graph coverage (Phase 2) ─────────────────────────────────────────────

onnx_graph:
  quantized_ops: null    # fill from results/onnx_graph.csv after run
  fp32_ops: null
  coverage_pct: null
  fp32_residuals_explanation: >
    Residual FP32 operators are typically activation functions (ReLU, SiLU)
    that have no INT8 equivalent in ONNX opset 17, or operator patterns
    specific to the depthwise-separable architecture that resist lowering.

# ── C++ benchmark findings (Phase 3) ─────────────────────────────────────────

cpp_benchmark:
  finding: >
    H4 (INT8 speedup grows with matrix size) is refuted. On Apple Silicon,
    INT8 is 5-8x slower than FP32 at all sizes. On x86 (Colab), INT8 is
    faster only at 128x128 (speedup 1.19) and slower at larger sizes.
    The INT8 arithmetic advantage — 16 int8_t values per 128-bit SIMD
    register versus 4 floats — does not materialise from compiler-generated
    code. It requires explicit SIMD intrinsics (SDOT on ARM, VNNI on x86)
    or a dedicated integer pipeline with no FP unit.
  basis: >
    Jacob et al. (2018) report 2-3x INT8 speedups on ARM using gemmlowp,
    a hand-optimised integer kernel library — not auto-vectorised C++.
    H4 was stated on the basis of that empirical result; the experiment
    identified the missing condition.
  implication: >
    On an NPU like NXP Ara-2, there is no FP path for INT8 to compete
    against. The advantage is total by construction. This is the mechanistic
    argument for why NPUs exist.

  apple_silicon:
    compiler: Apple Clang
    flags: -std=c++17 -O2 -march=native
    results:
      - { size: "128x128",   reps: 1000, fp32_ms: 0.143,  int8_ms: 0.717,   speedup: 0.199, max_err: 0.847 }
      - { size: "512x512",   reps: 100,  fp32_ms: 11.773, int8_ms: 90.206,  speedup: 0.131, max_err: 1.885 }
      - { size: "1024x1024", reps: 10,   fp32_ms: 96.316, int8_ms: 734.556, speedup: 0.131, max_err: 2.924 }

  x86_colab:
    compiler: GCC
    flags: -std=c++17 -O2 -march=native
    results:
      - { size: "128x128",   reps: 1000, fp32_ms: 2.822,  int8_ms: 2.367,    speedup: 1.192, max_err: 0.885 }
      - { size: "512x512",   reps: 100,  fp32_ms: 83.960, int8_ms: 167.263,  speedup: 0.502, max_err: 1.960 }
      - { size: "1024x1024", reps: 10,   fp32_ms: 657.360, int8_ms: 1527.646, speedup: 0.430, max_err: 3.084 }

# ── Reproducibility ───────────────────────────────────────────────────────────

environment:
  python: "3.11"
  pytorch: "2.11.0"
  torchvision: bundled
  quantization_api: FX graph mode
  onnx_opset: 17
  execution: Google Colab T4 GPU
  cpp_build: clang++ / g++ with -std=c++17 -O2 -march=native

repository: https://github.com/USERNAME/edge_zoo